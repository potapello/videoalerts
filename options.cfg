#
#   SERVER, LOGS
#
port=3000
logsTimezone="Europe/Moscow"
twitchIRCreconnectInterval=5000
twitchIRCpingInterval=false # try enable this, if you have disconnects from your twitch chat
oldVideoRemoverInterval=3000
#
#   TWITCH, USERS
#
channel="potapello" # also a moderator
moderators="moderator1,moderator2" # moderator can use special commands
banlist="" # banned user cannot use any commands
#
#   SCREEN, VIDEO, AUDIO
#
allowUnknownSourceVideos=false
screenWidth=1920 # 1080p by default, pixels
screenHeight=1080
videoMaxSize=400 # max width\height for videoalerts, pixels
videoMaxDuration=20000 # max videoalerts duration, in ms
videoApplyRotation=true # apply rotation to videoalerts, 60 is from -30 to 30 degrees
videoRotationDiap=60
audioVolume=100 # volume of audio in videoalerts, from 0 to 100 (do not change, control volume in OBS instead)
# 
# EFFECTS & MODIFIERS
#
allowModifiers=true # modifiers by users & random effects (for videoalerts)
allowRandomEffects=true
randomEffectChance=25 # chance of random effect, 0%-100%
# MODIFIERS
modifCustomSpeed=true # allow `speed X (0.25 - 3)` modifier
modifEasySpeed=true # allow `slower`, `faster` modifiers
modifAutoRotate=true
modifPosition=true # allow `pos X Y` modifier
# EFFECTS
efctFullscreen=true
efctSpamming=true
efctLongLife=true
efctChangeSpeed=true # allow `slower`, `faster` effects
efctAutoRotate=true