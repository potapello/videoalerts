<!DOCTYPE html>
<html>
<head>
    <title>Test Video Controller</title>
    <style>
        body { font-family: Arial; padding: 20px; }
        .controls { margin: 20px 0; }
        input { width: 300px; padding: 5px; margin: 5px; }
        button { padding: 10px 20px; margin: 5px; }
        .video-list { margin-top: 20px; }
        .video-item { padding: 10px; border: 1px solid #ccc; margin: 5px; }
    </style>
</head>
<body>
    <h1>Video Controller</h1>
    
    <div class="controls">
        <h3>Add Video</h3>
        <input type="text" id="videoUrl" placeholder="Video URL or local path" value="/temp/sample.mp4">
        <input type="text" id="customId" placeholder="Custom ID (optional)">
        <button onclick="runVideo()">Run Video</button>
        <button onclick="stopAll()">Stop All</button>
    </div>
    
    <div class="controls">
        <h3>Test Videos:</h3>
        <button onclick="testYouTube()">YouTube Video</button>
        <button onclick="testMP4()">MP4 Video</button>
        <button onclick="testMultiple()">Multiple Videos</button>
    </div>
    
    <div class="video-list">
        <h3>Active Videos:</h3>
        <div id="activeVideos">Loading...</div>
    </div>
    
    <div>
        <h3>OBS Screen:</h3>
        <a href="http://localhost:3000" target="_blank">Open OBS Screen</a> | 
        <a href="http://localhost:3000?debug" target="_blank">Open with Debug</a>
    </div>
    
    <script>
        const API_URL = 'http://localhost:3000/api';
        
        async function runVideo() {
            const videoUrl = document.getElementById('videoUrl').value;
            const customId = document.getElementById('customId').value;
            
            const response = await fetch(`${API_URL}/runVideo`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ videoUrl, customId })
            });
            
            const result = await response.json();
            alert(result.success ? `Video started: ${result.videoId}` : `Error: ${result.error}`);
            updateActiveVideos();
        }
        
        async function stopAll() {
            const response = await fetch(`${API_URL}/stopAll`, { method: 'POST' });
            const result = await response.json();
            alert(`Stopped ${result.stopped} videos`);
            updateActiveVideos();
        }
        
        async function updateActiveVideos() {
            const response = await fetch(`${API_URL}/activeVideos`);
            const data = await response.json();
            
            const videosHtml = data.videos.map(video => `
                <div class="video-item">
                    <strong>${video.id}</strong><br>
                    URL: ${video.url.substring(0, 50)}...<br>
                    Position: ${video.left}x${video.top} | Size: ${video.width}x${video.height}<br>
                    Started: ${new Date(video.startTime).toLocaleTimeString()}
                    <button onclick="stopVideo('${video.id}')">Stop</button>
                </div>
            `).join('');
            
            document.getElementById('activeVideos').innerHTML = 
                data.videos.length ? videosHtml : 'No active videos';
        }
        
        async function stopVideo(videoId) {
            await fetch(`${API_URL}/stopVideo/${videoId}`, { method: 'POST' });
            updateActiveVideos();
        }
        
        function testYouTube() {
            document.getElementById('videoUrl').value = 'https://www.youtube.com/watch?v=dQw4w9WgXcQ';
        }
        
        function testMP4() {
            document.getElementById('videoUrl').value = 'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ElephantsDream.mp4';
        }
        
        async function testMultiple() {
            const videos = [
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerJoyrides.mp4',
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/ForBiggerMeltdowns.mp4',
                'https://commondatastorage.googleapis.com/gtv-videos-bucket/sample/SubaruOutbackOnStreetAndDirt.mp4'
            ];
            
            for (const video of videos) {
                await fetch(`${API_URL}/runVideo`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ videoUrl: video })
                });
                await new Promise(resolve => setTimeout(resolve, 1000)); // Задержка 1 секунда
            }
            
            updateActiveVideos();
        }
        
        // Обновляем список каждые 2 секунды
        setInterval(updateActiveVideos, 2000);
        updateActiveVideos();
    </script>
</body>
</html>
