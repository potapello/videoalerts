<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Videoalerts Screen</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            width: 1920px;
            height: 1080px;
            background-color: #00ff00; /* Зеленый фон для chroma key */
            position: relative;
            overflow: hidden;
            font-family: Arial, sans-serif;
        }
        
        .video-container {
            position: absolute;
            border-radius: 10px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.5);
            transition: transform 0.3s ease, opacity 0.3s ease;
        }
        
        .video-container video {
            /* width: 100%;
            height: 100%; */
            object-fit: cover;
            display: block;
        }
        
        .video-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0,0,0,0.7));
            color: white;
            padding: 5px 10px;
            font-size: 12px;
            display: none; /* Скрываем в обычном режиме */
        }
        
        /* Индикатор для отладки (показывается при ?debug в URL) */
        .debug-info {
            position: fixed;
            top: 10px;
            left: 10px;
            background: rgba(0, 0, 0, 0.7);
            color: white;
            padding: 10px;
            border-radius: 5px;
            font-size: 14px;
            z-index: 10000;
        }
        
        .status-indicator {
            position: fixed;
            top: 10px;
            right: 10px;
            width: 20px;
            height: 20px;
            border-radius: 50%;
            /* disabled colors */
            background-color: #00ff0000; 
            box-shadow: 0 0 10px #00ff0000;
            z-index: 10000;
        }
        
        .connection-lost {
            background-color: #ff0000 !important;
            box-shadow: 0 0 10px #ff0000 !important;
        }

        .pb-progress-container {
            position: fixed;
            top: 20px;
            right: 20px;
            width: 20%;
            min-width: 200px;
            background: rgba(0, 0, 0, 0.699);
            border-radius: 12px;
            padding: 12px 16px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.15);
            z-index: 9999;
            transition: transform 0.3s ease, opacity 0.3s ease;
            transform: translateY(0);
            opacity: 1;
        }

        .pb-progress-container.hidden {
            transform: translateY(-120%);
            opacity: 0;
            pointer-events: none;
        }

        .pb-label {
            font-size: 20px;
            color: #fc9700;
            margin-bottom: 8px;
            font-weight: bolder;
            font-family: Arial, Helvetica, sans-serif;
        }

        .pb-bar-wrapper {
            position: relative;
            width: 100%;
            height: 24px;
            background: #382000c7;
            border-radius: 12px;
            overflow: hidden;
        }

        .pb-bar-fill {
            position: absolute;
            top: 0;
            left: 0;
            height: 100%;
            width: 0%;
            background: linear-gradient(90deg, #ff9900, #ff5e00);
            border-radius: 12px;
            transition: width 0.3s ease;
        }

        .pb-bar-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #ffffff;
            font-size: 16px;
            font-weight: 600;
            text-shadow: 0 1px 2px rgba(0, 0, 0, 0.308);
            z-index: 1;
            white-space: nowrap;
        }

        .rotate-animation {
            animation: rotate 3s linear infinite;
        }

        @keyframes rotate {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        .fullscreen_modifier {
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div id="video-container"></div>
    
    <!-- Отладочная информация (показывается при ?debug) -->
    <div class="debug-info" id="debugInfo" style="display: none;">
        Active Videos: <span id="videoCount">0</span><br>
        Connection: <span id="connectionStatus">Connected</span>
    </div>
    
    <div class="status-indicator" id="statusIndicator"></div>

    <div id="pbProgressBar" class="pb-progress-container hidden">
        <center><div class="pb-label">МЕМНЫЙ НАСЁР</div></center>
        <div class="pb-bar-wrapper">
            <div class="pb-bar-fill" id="pbBarFill"></div>
            <span class="pb-bar-text" id="pbBarText">0 из 100</span>
        </div>
    </div>
    
    <script src="/socket.io/socket.io.js"></script>
    <script>
        // Проверяем режим отладки
        const urlParams = new URLSearchParams(window.location.search);
        const debugMode = urlParams.has('debug');
        
        if (debugMode) {
            document.getElementById('debugInfo').style.display = 'block';
        };
        
        const socket = io();
        let connectionActive = true;
        
        // Элементы DOM
        const videoContainer = document.getElementById('video-container');
        const statusIndicator = document.getElementById('statusIndicator');
        const videoCountElement = document.getElementById('videoCount');
        const connectionStatusElement = document.getElementById('connectionStatus');
        
        // Обновление счетчика видео
        function updateVideoCount() {
            if (debugMode) {
                videoCountElement.textContent = document.querySelectorAll('.video-container').length;
            }
        };
        
        // Создание элемента видео
        function createVideoElement(videoData, skipPB=false) {
            var container = document.createElement('div');
            container.className = 'video-container';
            container.id = `video_${videoData.id}`;
            container.dataset.videoId = videoData.id;
            container.dataset.url = videoData.url;
            
            // Стилизация
            container.style.maxWidth = `${videoData.width}px`;
            container.style.maxHeight = `${videoData.height}px`;
            container.style.top = `${videoData.top}px`;
            container.style.left = `${videoData.left}px`;
            container.style.transform = `rotate(${videoData.rotation}deg)`;
            
            // Создаем видео элемент
            const video = document.createElement('video');
            video.autoplay = true;
            // video.muted = false; // Включаем звук

            // автоподстройка размеров видеоэлемента
            // setTimeout(() => {
            //     if(video.clientHeight > video.clientWidth) {video.height = videoData.height} else {video.height = videoData.height}
            // }, 2000);
            video.oncanplay = () => {if(video.clientHeight > video.clientWidth) {video.height = videoData.height} else {video.height = videoData.height}};
            
            // ютуб хуита
            if(videoData.type == 'yt') {
                // разлок высоты для шортов
                if(videoData.url.includes('/shorts/')) {
                    container.style.maxHeight = ``;
                };
                // делаем елемент
                var yvid = createYouTubePlayer(videoData);
                if(yvid === undefined) {return}
                else {container.innerHTML = yvid}

            // тикиток картинки
            } else if(videoData.type == 'tti') {
                const data = JSON.parse(videoData.url);

                const music = document.createElement('audio');
                music.autoplay = true;
                music.controls = false;
                music.loop = true;
                music.volume = videoData.volume;
                music.src = String(data.play);
                container.appendChild(music);

                if(data.images) {
                    const image = new Image();
                    image.src = data.images[0];
                    image.style.maxHeight = `${videoData.height}px`;
                    image.style.maxWidth = `${videoData.width}px`;
                    image.style.objectFit = 'contain';

                    if(data.images.length > 1) {
                        var count = Math.min(Math.floor(videoData.duration/2500), data.images.length);
                        var qtime = Math.floor(videoData.duration / count);
                        for(let i = 1; i < count; i++) {
                            if(data.images[i]) {setTimeout(() => {image.src = data.images[i]}, qtime * i)} else {break}
                        };
                    };
                    container.appendChild(image)
                };
            // остальные  
            } else {
                video.src = videoData.url;
                video.volume = videoData.volume;

                if(videoData.type == 'tt') {
                    video.loop = true;
                    // container.style.maxHeight = ``;
                } else {
                    video.loop = videoData.effect == 'longlife';
                    // Обработка конца видео
                    video.onended = function() {
                        removeVideoElement(videoData.id);
                    };
                }
                
                container.appendChild(video);
            };

            // Автоматическое удаление через (на всякий случай)
            setTimeout(() => {
                removeVideoElement(videoData.id);
            }, videoData.duration);
            
            // Добавляем оверлей для отладки
            if (debugMode) {
                const overlay = document.createElement('div');
                overlay.className = 'video-overlay';
                overlay.textContent = `ID: ${videoData.id.substring(0, 8)}`;
                overlay.style.display = 'block';
                container.appendChild(overlay);
            };

            if(!skipPB) {
                if(!videoData.affected) {
                    pbAddToCount(1);
                    histAdd(videoData.url)
                };
                if(videoData.modifier) {pbAddToCount(1)}
            };

            return container
        };

        // Функция для извлечения ID видео из различных форматов ссылок YouTube
        function getYouTubeVideoId(url) {
            const regex = /(?:youtube\.com\/(?:[^\/\n\s]+\/\S+\/|(?:v|e(?:mbed)?)\/|.*[?&]v=)|youtu\.be\/|youtube\.com\/shorts\/)([a-zA-Z0-9_-]{11})/;
            const match = url.match(regex);
            return match ? match[1] : null;
        };

        // Функция для создания URL embed
        function getYouTubeEmbedUrl(url) {
            const videoId = getYouTubeVideoId(url);
            return videoId ? 'https://www.youtube-nocookie.com/embed/' + videoId : null;
        };

        // Основная логика
        function createYouTubePlayer(videoData) {
            // Проверяем, является ли видео shorts
            const isShort = videoData.url.includes('/shorts/');
            // Получаем embed URL
            const embedUrl = getYouTubeEmbedUrl(videoData.url);
            if (!embedUrl) {console.error('Invalid YouTube URL'); return};
            // Параметры для iframe
            let params = new URLSearchParams();
            params.append('rel', '0');
            params.append('modestbranding', '1');
            params.append('autoplay', '1');
            params.append('controls', '0');
            params.append('playsinline', '1');
            if(isShort) {params.append('loop', '1')};
            // Создаем iframe
            return `
                <iframe 
                    width="${videoData.width}" 
                    height="${videoData.height}" 
                    src="${embedUrl}?${params.toString()}" 
                    frameborder="0" 
                    allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
                    allowfullscreen
                    style="display: block;"
                    title="YouTube video player">
                </iframe>`;
        };

        // Удаление элемента видео
        function removeVideoElement(videoId) {
            const element = document.getElementById(`video_${videoId}`);
            if (element) {
                element.style.opacity = '0';
                element.style.transform = `${element.style.transform} scale(0.8)`;
                setTimeout(() => {
                    if (element.parentNode) {
                        element.parentNode.removeChild(element);
                        updateVideoCount();
                    }
                }, 300);
            }
        };
        
        // Очистка всех видео
        function clearAllVideos() {
            videoContainer.innerHTML = '';
            updateVideoCount();
        };
        
        // Обработка WebSocket событий
        socket.on('connect', () => {
            console.log('Connected to server');
            connectionActive = true;
            statusIndicator.classList.remove('connection-lost');
            if (debugMode) connectionStatusElement.textContent = 'Connected';
        });
        
        socket.on('disconnect', () => {
            console.log('Disconnected from server');
            connectionActive = false;
            statusIndicator.classList.add('connection-lost');
            if (debugMode) connectionStatusElement.textContent = 'Disconnected';
        });
        
        socket.on('init', (data) => {
            console.log('Initial data received:', data.videos.length, 'videos');
            clearAllVideos();
            
            // Добавляем активные видео
            data.videos.forEach(videoData => {
                videoAddWorker(videoData, true)
            });
        });

        socket.on('videoAdded', videoAddWorker);

        function videoAddWorker(videoData, skipPB=false) {
            const element = createVideoElement(videoData, skipPB);
            if(element) {
                // setup effects
                if(videoData.affected || videoData.type == 'tti') { // если эффект уже есть - кидаем сразу
                    if(videoData.modifier) {
                        console.log('video modifier:', videoData.modifier);
                        appendModifierOnElement(element, videoData)
                    } else {
                        videoContainer.appendChild(element)
                    }
                } else {
                    if(videoData.effect != 'none') {
                        appendEffectOnElement(element, videoData);
                        console.log("Video effect:", videoData.effect)
                    } else {
                        videoContainer.appendChild(element)
                    }

                };
                updateVideoCount();
            }
        };
        // random effects
        function appendEffectOnElement(element = new HTMLDivElement(), videoData) {
            videoData.affected = true;
            if(videoData.effect == 'fullscreen') {
                element.style.transform = ``;
                element.style.top = `0px`;
                element.style.left = `0px`;
                element.style.maxWidth = `1920px`;
                element.style.maxHeight = `1080px`;
                if(videoData.type != 'yt') {
                    var media = element.getElementsByTagName('video')[0];
                    media.style.height = '1080px';
                    setTimeout(() => {element.style.left = `${Math.floor(1920/2 - element.clientWidth/2)}px`}, 1000);
                    videoContainer.appendChild(element);
                } else {
                    var vd = videoData;
                    vd.width = 1920;
                    vd.height = 1080;
                    vd.left = 0; vd.top = 0; vd.rotation = 0;
                    videoContainer.appendChild(createVideoElement(vd, true));
                    setTimeout(() => {removeVideoElement(videoData.id);}, 15000);
                }
            } else if(videoData.effect == 'row') {
                videoContainer.appendChild(element);
                setTimeout(() => {apiRunVideo(videoData, {lifetime: 10000, affected: true})}, 1000);
                setTimeout(() => {apiRunVideo(videoData, {lifetime: 10000, affected: true})}, 2000);
                if(Math.random() < 0.66) {setTimeout(() => {apiRunVideo(videoData, {lifetime: 10000, affected: true})}, 3000)};
                if(Math.random() < 0.33) {setTimeout(() => {apiRunVideo(videoData, {lifetime: 10000, affected: true})}, 4000)};
            } else if (videoData.effect == 'longlife') {
                    try {element.removeChild(element.getElementsByTagName('video')[0])} catch(e) {}; // костыль против какоготохуя играющего саунда вне контейнера
                    fetch(`http://localhost:3000/api/stopVideo/${videoData.id}`, {method: 'POST'});
                    apiRunVideo(videoData, {lifetime: Math.floor(60000 + Math.random() * 60000), affected: true})
            } else if (videoData.effect == 'slower' || videoData.effect == 'faster') {
                var media = element.getElementsByTagName('video')[0];

                if(media) {
                    media.preservesPitch = false;
                    media.playbackRate = videoData.effect == 'slower' ? 0.7 : 1.5
                };

                videoContainer.appendChild(element)
            } else if(videoData.effect == 'rotate') {
                element.classList.add('rotate-animation');
                videoContainer.appendChild(element)
            }
        };
        // modifiers by users
        function appendModifierOnElement(element, videoData) {
            var modifier = videoData.modifier.split(' ');
            // position
            if(modifier[0] == 'pos') {
                element.style.transform = ``;
                element.style.left = `${modifier[1] < 0 ? 0 : modifier[1] > 1920 ? 1920 : modifier[1]}px`;
                element.style.top = `${modifier[2] < 0 ? 0 : modifier[2] > 1080 ? 1080 : modifier[2]}px`;
                videoContainer.appendChild(element);
            // effects
            } else if(modifier[0] == 'slower' || modifier[0] == 'faster' || modifier[0] == 'speed') {
                var media = element.getElementsByTagName('video')[0];
                media = media ? media : element.getElementsByTagName('audio')[0];
                if(media) {
                    media.preservesPitch = false;
                    if(modifier[0] == 'faster') {media.playbackRate = 1.5}
                    else if(modifier[0] == 'slower') {media.playbackRate = 0.7}
                    else if(modifier[0] == 'speed') {media.playbackRate = modifier[1]};
                };
                videoContainer.appendChild(element)
            } else if(modifier[0] == 'rotate') {
                element.classList.add('rotate-animation');
                videoContainer.appendChild(element)
            } else {
                videoContainer.appendChild(element)
            }
        };
        
        socket.on('videoRemoved', (videoId) => {
            // console.log('Video removed:', videoId);
            removeVideoElement(videoId);
        });
        
        socket.on('clearAll', () => {
            console.log('Clearing all videos');
            clearAllVideos();
        });
        
        // Автоматическое переподключение
        setInterval(() => {
            if (!connectionActive && socket.disconnected) {
                console.log('Attempting to reconnect...');
                socket.connect();
            }
        }, 5000);
        
        // Обновление счетчика каждую секунду в режиме отладки
        if (debugMode) {
            setInterval(updateVideoCount, 1000);
        };

        // Состояние прогресс-бара
        let pbCount = 0;
        let pbTotal = 25;
        let pbEventTime = 31; // +1 time for running memes
        let pbEventProgress = 0;
        let pbLastAlerts = [];
        let pbDefaultTime = 7;
        let pbTimeout = null;
        const pbElement = document.getElementById('pbProgressBar');
        const pbFillElement = document.getElementById('pbBarFill');
        const pbTextElement = document.getElementById('pbBarText');

        // Функция обновления отображения
        function pbUpdateDisplay(showtime=pbDefaultTime) {
            const percentage = Math.min((pbCount / pbTotal) * 100, 100);
            pbFillElement.style.width = percentage + '%';
            pbTextElement.textContent = `${pbCount} из ${pbTotal}`;

            // Показываем элемент
            pbElement.classList.remove('hidden');

            // Сбрасываем предыдущий таймаут
            if (pbTimeout) {
                clearTimeout(pbTimeout);
            };
    
            // Устанавливаем новый таймаут для скрытия через 10 секунд
            pbTimeout = setTimeout(() => {
                pbElement.classList.add('hidden');
                pbTimeout = null;
            }, showtime*1000);
        };

        // Функция добавления значения к прогрессу
        function pbAddToCount(value) {
            if(pbEventProgress > 0) {return}; // skip if event running
            pbCount += value;

            // Проверка на достижение или превышение лимита
            if (pbCount >= pbTotal) {
                pbCount = pbTotal;
                localStorage.setItem(HIST_PB_COUNT_KEY, '0');
                pbUpdateDisplay(pbEventTime+12);
                pbOnComplete();
            } else {
                localStorage.setItem(HIST_PB_COUNT_KEY, String(pbCount));
                pbUpdateDisplay();
            }
        };

        // Функция, вызываемая при завершении
        function pbOnComplete() {
            console.log('Прогресс завершен! Счетчик обнулен.');
            // запускаем мем пушку
            pbEventProgress = +pbEventTime;
            pbLastAlerts = histGetAllText();
            pbDeployRandomAlerts();
            // Обнуляем счетчик на всякий
            pbCount = 0;
        };

        function pbRandomAlert() {
            return pbLastAlerts[Math.floor(Math.random() * (pbLastAlerts.length - 0.001))]
        };
        var _randomalertseffects = ['rotate', 'none', 'slower', 'none', 'faster'];
        var _randomalertsgeteff = () => _randomalertseffects[Math.floor(Math.random() * (_randomalertseffects - 0.001))];

        function pbDeployRandomAlerts() {
            pbEventProgress -= 1;
            if(pbEventProgress > 1) {
                var eff = _randomalertsgeteff();
                if(Math.random() < 0.9) {apiRunVideo({}, {url: pbRandomAlert(), lifetime: 10000, affected: eff=='none', effect: eff, type: undefined})};
                eff = _randomalertsgeteff();
                if(Math.random() < 0.5) {apiRunVideo({}, {url: pbRandomAlert(), lifetime: 10000, affected: eff=='none', effect: eff, type: undefined})};
                // if(Math.random() < 0.4) {apiRunVideo({}, {url: pbRandomAlert(), lifetime: 10000, affected: true, effect: 'none', type: undefined})};
                setTimeout(() => {pbDeployRandomAlerts()}, 1000)
            } else {
                setTimeout(() => {pbEventProgress = 0; pbSetProgress(0, pbTotal)}, 5*1000);
            }
        };

        // Функция ручной установки значений
        function pbSetProgress(count, total) {
            pbCount = count;
            pbTotal = total;
            localStorage.setItem(HIST_PB_COUNT_KEY, String(count));
            localStorage.setItem(HIST_PB_TOTAL_KEY, String(total));
            pbUpdateDisplay(5);
        };

        // Функция сброса прогресса
        function pbReset() {
            pbCount = 0;
            localStorage.setItem(HIST_PB_COUNT_KEY, '0');
            pbUpdateDisplay(5);
        };

        setTimeout(() => {pbUpdateDisplay(10)}, 1000); // первое отображение при запуске

        // контроль через апи сервера
        socket.on('pbShow', () => {pbUpdateDisplay(5)});

        socket.on('pbSetValues', (values) => {
            pbSetProgress(values.count, values.total)
        });

        //
        // ИСТОРИЯ МЕМОВ
        //
        const HIST_MAX = 25; // Максимальное количество хранимых сообщений
        const HIST_STORAGE_KEY = 'histMessages';
        const HIST_PB_COUNT_KEY = 'histLastPBCount';
        const HIST_PB_TOTAL_KEY = 'histLastPBTotal';

        // Инициализация истории при загрузке
        function histInitialize() {
            if (!localStorage.getItem(HIST_STORAGE_KEY)) {
                localStorage.setItem(HIST_STORAGE_KEY, JSON.stringify([]));
            };
            if (!localStorage.getItem(HIST_PB_COUNT_KEY)) {
                localStorage.setItem(HIST_PB_COUNT_KEY, '0');
            };
            if (!localStorage.getItem(HIST_PB_TOTAL_KEY)) {
                localStorage.setItem(HIST_PB_TOTAL_KEY, '0');
            };
        };
        // Инициализация при загрузке
        histInitialize();

        // загрузка PB переменных из памяти
        pbCount = +localStorage.getItem(HIST_PB_COUNT_KEY);
        pbTotal = +localStorage.getItem(HIST_PB_TOTAL_KEY);

        // Функция добавления нового сообщения в историю
        function histAdd(message) {
            if(typeof message != "string") {return};
            // Получаем текущую историю
            let history = histGetAll();

            // Добавляем новое сообщение с временной меткой
            const newEntry = {
                text: message,
            };

            // проверка на повтор
            for(let i=0; i<history.length; i++) {
                if(history[i].text == newEntry.text) {return}
            };

            // Проверяем, нужно ли перезаписывать
            if (history.length >= HIST_MAX) {
                // Выбираем случайный индекс для замены
                const randomIndex = Math.floor(Math.random() * history.length);
                history[randomIndex] = newEntry;
            } else {
                // Просто добавляем новое сообщение
                history.push(newEntry);
            };

            // Сохраняем обновленную историю
            localStorage.setItem(HIST_STORAGE_KEY, JSON.stringify(history));

            return history;
        };

        // Функция получения всей истории
        function histGetAll() {
            const historyJson = localStorage.getItem(HIST_STORAGE_KEY);
            if (!historyJson) {
                return [];
            };

            try {
                return JSON.parse(historyJson);
            } catch (e) {
                console.error('Ошибка парсинга истории:', e);
                return [];
            }
        };

        // Функция получения истории в виде массива строк (без метаданных)
        function histGetAllText() {
            return histGetAll().map(entry => entry.text);
        };

        // Функция очистки истории
        function histClear() {
            localStorage.setItem(HIST_STORAGE_KEY, JSON.stringify([]));
        };
        // 
        // debug assets
        //
        debugMemealertURL = 'https://cdns.memealerts.com/p/64e0ffc90ea4a1112723d1ee/fd020ee4-7ecd-40ad-804d-ff1722f3384a/alert_orig.webm';
        
        // Клик для тестирования (только в режиме отладки)
        if (debugMode) {
            document.body.addEventListener('click', (e) => {
                if (e.target === document.body) {
                    // Тестовый запрос на добавление видео
                    fetch('/api/runVideo', {
                        method: 'POST',
                        headers: {'Content-Type': 'application/json'},
                        body: JSON.stringify({
                            videoUrl: debugMemealertURL
                        })
                    })
                }
            })
        };
        // функция для запуска разных видео
        function apiRunVideo(vd, changes = {}) {
            fetch('/api/runVideo', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({
                    videoUrl: changes.url !== undefined ? changes.url : vd.url,
                    type: changes.type !== undefined ? changes.type : vd.type,
                    lifetime: changes.lifetime !== undefined ? changes.lifetime : vd.lifetime,
                    affected: changes.affected !== undefined ? changes.affected : vd.affected,
                    effect: changes.effect !== undefined ? changes.effect : vd.effect,
                })
            })
        };

    </script>
